<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Friendinerary</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      width: 340px;
      min-height: 200px;
      background: #fff;
      color: #111827;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 14px 16px;
      background: linear-gradient(135deg, #F97316, #ea580c);
      color: white;
    }
    .header-logo { font-size: 20px; }
    .header-title { font-size: 15px; font-weight: 700; }

    .section { padding: 16px; }

    .form-group { margin-bottom: 12px; }
    label { display: block; font-size: 12px; font-weight: 600; color: #6B7280; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
    input, select, textarea {
      width: 100%;
      border: 1.5px solid #E5E7EB;
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 14px;
      color: #111827;
      outline: none;
      transition: border-color 0.15s;
      font-family: inherit;
    }
    input:focus, select:focus, textarea:focus { border-color: #F97316; }
    textarea { resize: none; height: 56px; }

    .btn {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.85; }
    .btn-primary { background: #F97316; color: white; }
    .btn-secondary { background: #F3F4F6; color: #374151; margin-top: 8px; }

    .status {
      display: none;
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 12px;
    }
    .status-success { background: #D1FAE5; color: #065F46; }
    .status-error { background: #FEE2E2; color: #991B1B; }
    .status-info { background: #DBEAFE; color: #1E40AF; }

    .footer {
      padding: 10px 16px;
      border-top: 1px solid #F3F4F6;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .footer-text { font-size: 11px; color: #9CA3AF; }
    #logout-btn { font-size: 12px; color: #9CA3AF; background: none; border: none; cursor: pointer; }
    #logout-btn:hover { color: #EF4444; }
  </style>
</head>
<body>

<div class="header">
  <span class="header-logo">✈️</span>
  <span class="header-title">Friendinerary</span>
</div>

<!-- Login section -->
<div id="login-section" class="section">
  <p style="font-size:13px;color:#6B7280;margin-bottom:14px;">Sign in to save places to your trips</p>
  <div class="form-group">
    <label>Email</label>
    <input type="email" id="email" placeholder="you@example.com" />
  </div>
  <div class="form-group">
    <label>Password</label>
    <input type="password" id="password" placeholder="••••••••" />
  </div>
  <button class="btn btn-primary" id="login-btn">Sign in</button>
</div>

<!-- Main section -->
<div id="main-section" class="section" style="display:none">
  <div id="status" class="status"></div>

  <div class="form-group">
    <label>Place name</label>
    <input type="text" id="place-name" placeholder="Restaurant, attraction, hotel..." />
  </div>
  <div class="form-group">
    <label>Address</label>
    <input type="text" id="place-address" placeholder="Optional" />
  </div>
  <div class="form-group">
    <label>Trip</label>
    <select id="trip-select"></select>
  </div>
  <div class="form-group">
    <label>Section</label>
    <select id="section-select"></select>
  </div>
  <div class="form-group">
    <label>Notes (optional)</label>
    <textarea id="notes" placeholder="Any notes about this place..."></textarea>
  </div>
  <button class="btn btn-primary" id="save-btn">Save to trip ✓</button>
</div>

<div class="footer">
  <span class="footer-text">Friendinerary</span>
  <button id="logout-btn">Sign out</button>
</div>

<script src="popup.js"></script>
</body>
</html>
